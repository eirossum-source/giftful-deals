<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Shop Example Coupons</title>
  </head>
  <body>
    <ul class="offers">
      <li class="offer" data-code="SAVE20" data-expires="2099-12-31">
        <span class="code">SAVE20</span>
        <span class="description">20% off your order</span>
        <span class="expiry">Expires 2099-12-31</span>
      </li>
      <li class="offer" data-code="FREESHIP" data-expires="2099-06-15">
        <span class="code">FREESHIP</span>
        <span class="description">Free shipping on orders over $50</span>
        <span class="expiry">Expires 2099-06-15</span>
      </li>
      <li class="offer expired" data-code="OLD10" data-expires="2020-01-01">
        <span class="code">OLD10</span>
        <span class="description">10% off (expired)</span>
        <span class="expiry">Expired 2020-01-01</span>
      </li>
    </ul>
  </body>
</html>
