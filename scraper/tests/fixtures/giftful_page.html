<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Isaac's List</title>
  </head>
  <body>
    <main class="wishlist">
      <article class="wish-item" data-item-id="1">
        <a class="wish-item-link" href="https://shop.example.com/products/headphones">
          <img src="https://cdn.example.com/img/headphones.jpg" alt="Wireless headphones" />
          <h3 class="wish-item-title">Wireless Headphones</h3>
        </a>
        <span class="wish-item-price">$199.00</span>
      </article>
      <article class="wish-item" data-item-id="2">
        <a class="wish-item-link" href="https://store.example.net/coffee-grinder">
          <img src="https://cdn.example.net/img/grinder.jpg" alt="Burr grinder" />
          <h3 class="wish-item-title">Burr Coffee Grinder</h3>
        </a>
        <span class="wish-item-price">$249.99</span>
      </article>
      <article class="wish-item" data-item-id="3">
        <a class="wish-item-link" href="https://gear.example.org/backpack-40l">
          <img src="https://cdn.example.org/img/pack.jpg" alt="Travel backpack" />
          <h3 class="wish-item-title">40L Travel Backpack</h3>
        </a>
        <span class="wish-item-price">$129.50</span>
      </article>
    </main>
  </body>
</html>
