<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Wireless Headphones — Shop Example</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Shop Example"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Wireless Headphones",
        "offers": {
          "@type": "Offer",
          "priceCurrency": "USD",
          "price": "149.00",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>
  </head>
  <body>
    <h1>Wireless Headphones</h1>
    <p>Regular price $199.00</p>
  </body>
</html>
